# CI (Continuous Integration): checks that run automatically on GitHub for every
# Pull Request and every push to main. If any step fails, the PR is marked
# failing - and (once we make it a required check) it can't be merged.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-checks:
    name: backend-checks
    runs-on: ubuntu-latest   # GitHub gives us a fresh Linux machine each run.
    defaults:
      run:
        working-directory: backend   # run every step inside the backend/ folder

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check app tests

      - name: Check formatting with Ruff
        run: ruff format --check app tests

      - name: Run tests
        run: pytest
